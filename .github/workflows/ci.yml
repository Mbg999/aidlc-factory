name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
      - uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 #v23.0.0
        with:
          globs: "**/*.md"

  install-dry-run:
    name: Install Dry Run (with Skills)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        tool: [copilot, claude, cursor, cline]
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 #v5.6.0
        with:
          python-version: "3.11"
      - name: Dry-run install with agent-skills
        run: |
          python aidlc-scripts/install_aidlc.py \
            --tool ${{ matrix.tool }} \
            --dest /tmp/aidlc-test \
            --yes \
            --dry-run \
            --with-agent-skills

  agent-skills-integration:
    name: Agent Skills Integration Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 #v5.6.0
        with:
          python-version: "3.11"
      - name: Install for Copilot with agent-skills
        run: |
          python aidlc-scripts/install_aidlc.py \
            --tool copilot \
            --dest /tmp/aidlc-copilot \
            --yes \
            --with-agent-skills
      - name: Verify skills installed
        run: |
          echo "=== Checking installed AIDLC rules ==="
          test -f /tmp/aidlc-copilot/.github/copilot-instructions.md
          echo "=== Checking installed skills ==="
          SKILL_COUNT=$(find /tmp/aidlc-copilot/.agents/skills -name "SKILL.md" | wc -l)
          echo "Installed $SKILL_COUNT skill files"
          test "$SKILL_COUNT" -gt 0

  orchestrator-scripts:
    name: Orchestrator Script Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 #v5.6.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyyaml jsonschema pytest
      - name: Run orchestrator script tests
        run: pytest tests/ --tb=short -v
      - name: Smoke test triage
        run: python3 aidlc-scripts/factory_triage.py prefilter "add healthz endpoint" | grep TINY
      - name: Smoke test triage dry-run
        run: python3 aidlc-scripts/factory_triage.py prefilter "refactor auth" --dry-run | grep "FULL pipeline"
      - name: Smoke test triage explain
        run: python3 aidlc-scripts/factory_triage.py prefilter "add healthz" --explain 2>&1 | grep "TRIAGE"
      - name: Smoke test secretscan (clean file)
        run: python3 aidlc-scripts/factory_secretscan.py .claude/commands/factory-spec.md
      - name: Smoke test secretscan (with mock secret)
        run: |
          echo '{"body": "My API key is sk-abc123def456ghi789jkl"}' > /tmp/test-secret.json
          python3 aidlc-scripts/factory_secretscan.py /tmp/test-secret.json --json | grep secrets_found
          rm /tmp/test-secret.json
      - name: Smoke test audit writes
        run: python3 aidlc-scripts/factory_audit_writes.py test-run unit-a --locks src/** --repo-root . --json | grep '"status": "ok"'
