name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
      - uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 #v23.0.0
        with:
          globs: "**/*.md"

  install-dry-run:
    name: Install Dry Run (with Skills)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        tool: [copilot, claude, cursor, cline]
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 #v5.6.0
        with:
          python-version: "3.11"
      - name: Dry-run install with agent-skills
        run: |
          python scripts/install_aidlc.py \
            --tool ${{ matrix.tool }} \
            --dest /tmp/aidlc-test \
            --yes \
            --dry-run \
            --with-agent-skills

  agent-skills-integration:
    name: Agent Skills Integration Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 #v5.6.0
        with:
          python-version: "3.11"
      - name: Install for Copilot with agent-skills
        run: |
          python scripts/install_aidlc.py \
            --tool copilot \
            --dest /tmp/aidlc-copilot \
            --yes \
            --with-agent-skills
      - name: Verify skills installed
        run: |
          echo "=== Checking installed AIDLC rules ==="
          test -f /tmp/aidlc-copilot/.github/copilot-instructions.md
          echo "=== Checking installed skills ==="
          SKILL_COUNT=$(find /tmp/aidlc-copilot/.agents/skills -name "SKILL.md" | wc -l)
          echo "Installed $SKILL_COUNT skill files"
          test "$SKILL_COUNT" -gt 0
