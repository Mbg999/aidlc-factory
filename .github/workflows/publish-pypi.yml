name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish-to:
        description: "Destination"
        required: true
        default: "test-pypi"
        type: choice
        options:
          - test-pypi
          - pypi

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to ${{ inputs.publish-to || 'PyPI' }}
    needs: [build]
    if: >
      startsWith(github.ref, 'refs/tags/v')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.publish-to || 'pypi' }}
      url: ${{ github.event_name == 'workflow_dispatch' && inputs.publish-to == 'pypi' && 'https://pypi.org/project/aidlc-factory-installer/' || 'https://test.pypi.org/project/aidlc-factory-installer/' }}
    steps:
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        if: >
          startsWith(github.ref, 'refs/tags/v')
          || (github.event_name == 'workflow_dispatch' && inputs.publish-to == 'pypi')
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          packages-dir: dist/

      - name: Publish to Test PyPI
        if: >
          github.event_name == 'workflow_dispatch' && inputs.publish-to == 'test-pypi'
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
